name: Build Workflow

on:
  workflow_dispatch:
  pull_request:
    branches: [main, dev]
    paths:
      - "setup.py"
      - "hardware/**"
      - "include/**"
      - "keyboards/**"
      - "linker/**"
      - "scripts/**"
      - "src/**"
      - ".github/workflows/build.yml"
      - ".github/workflows/ci_define_matrix.py"
  push:
    branches: [main, dev]
    paths:
      - "setup.py"
      - "hardware/**"
      - "include/**"
      - "keyboards/**"
      - "linker/**"
      - "scripts/**"
      - "src/**"
      - ".github/workflows/build.yml"
      - ".github/workflows/ci_define_matrix.py"
    tags: ["v*"]

permissions:
  contents: write

jobs:
  define-matrix:
    name: Define Action Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.define-matrix.outputs.matrix }}
    steps:
      - name: Checkout libhmk
        uses: actions/checkout@v5

      - name: Generate Matrix
        id: define-matrix
        run: |
          MATRIX_JSON=$(python .github/workflows/ci_define_matrix.py)
          echo "matrix=$MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  native-tests:
    name: Native Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout libhmk
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup PlatformIO Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Run Native Test Suite
        run: |
          python setup.py -k mochiko40he
          pio test

      - name: Run Native Test Suite With Sanitizers
        run: |
          LIBHMK_NATIVE_SANITIZERS=1 python setup.py -k mochiko40he
          pio test

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout libhmk
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup PlatformIO Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Install Cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Generate compile_commands.json
        run: |
          python setup.py -k mochiko40he
          pio run -e mochiko40he -t compiledb

      - name: Run Cppcheck
        run: |
          cppcheck \
            --project=compile_commands.json \
            --enable=warning,style,performance,portability \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --error-exitcode=1 \
            2> cppcheck.txt

      - name: Archive Cppcheck Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck.txt

  build:
    name: Build Firmware
    needs: [define-matrix, native-tests]
    strategy:
      matrix:
        include: ${{ fromJson(needs.define-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout libhmk
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup PlatformIO Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build ${{ matrix.keyboard }}
        run: |
          LIBHMK_STACK_USAGE=1 python setup.py -k ${{ matrix.keyboard }}
          pio run

      - name: Check Firmware Size Budget
        run: |
          python scripts/check_memory_budget.py \
            --keyboard ${{ matrix.keyboard }} \
            --elf .pio/build/${{ matrix.keyboard }}/firmware.elf

      - name: Summarize Stack Usage
        run: |
          python scripts/summarize_stack_usage.py \
            --build-dir .pio/build/${{ matrix.keyboard }} \
            --keyboard ${{ matrix.keyboard }} \
            --output .pio/build/${{ matrix.keyboard }}/stack-usage.txt

      - name: Archive Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.keyboard }}
          path: |
            .pio/build/${{ matrix.keyboard }}/firmware.bin
            .pio/build/${{ matrix.keyboard }}/firmware.elf
            .pio/build/${{ matrix.keyboard }}/stack-usage.txt

  release:
    name: Create Releast Draft
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Firmware Artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: firmware-*

      - name: Zip Firmware Binaries
        run: zip -r firmware.zip firmware-*

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: firmware.zip
